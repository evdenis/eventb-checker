name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:
    inputs:
      model-path:
        description: "Glob pattern for .zip model files to validate"
        required: true
        type: string
      java-version:
        description: "Java version to use"
        required: false
        type: string
        default: "21"
      checker-ref:
        description: "Git ref of eventb-checker to build"
        required: false
        type: string
        default: "main"
      verbose:
        description: "Enable verbose output"
        required: false
        type: boolean
        default: false
      format:
        description: "Output format: text or json"
        required: false
        type: string
        default: "text"
    outputs:
      valid:
        description: "Whether all models passed validation (true/false)"
        value: ${{ jobs.validate-models.outputs.valid }}
      error-count:
        description: "Total number of errors across all models"
        value: ${{ jobs.validate-models.outputs.error-count }}
      warning-count:
        description: "Total number of warnings across all models"
        value: ${{ jobs.validate-models.outputs.warning-count }}

jobs:
  build:
    if: ${{ github.event_name != 'workflow_call' }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4

      - run: ./gradlew build

  validate-models:
    if: ${{ github.event_name == 'workflow_call' }}
    runs-on: ubuntu-latest
    outputs:
      valid: ${{ steps.validate.outputs.valid }}
      error-count: ${{ steps.validate.outputs.error-count }}
      warning-count: ${{ steps.validate.outputs.warning-count }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/checkout@v6
        with:
          repository: eventb-org/eventb-checker
          ref: ${{ inputs.checker-ref }}
          path: _checker

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ inputs.java-version }}

      - uses: gradle/actions/setup-gradle@v4

      - name: Build checker
        run: ./gradlew -p _checker installDist

      - name: Validate models
        id: validate
        shell: bash
        env:
          CHECKER_CMD: "_checker/build/install/eventb-checker/bin/eventb-checker"
          MODEL_GLOB: ${{ inputs.model-path }}
          FORMAT: ${{ inputs.format }}
          VERBOSE_FLAG: ${{ inputs.verbose == true && '--verbose' || '' }}
        run: bash _checker/.github/scripts/validate-models.sh
