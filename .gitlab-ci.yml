stages:
  - build
  - release

variables:
  GRADLE_USER_HOME: "${CI_PROJECT_DIR}/.gradle"
  GRADLE_OPTS: "-Dorg.gradle.daemon=false"

.gradle-cache:
  cache:
    key: gradle
    paths:
      - .gradle/caches
      - .gradle/wrapper

build:
  stage: build
  image: eclipse-temurin:21-jdk
  extends: .gradle-cache
  script:
    - ./gradlew build
  artifacts:
    when: always
    reports:
      junit: build/test-results/test/TEST-*.xml
  rules:
    - if: $CI_PIPELINE_SOURCE == "web"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - src/**/*
        - build.gradle.kts
        - settings.gradle.kts
        - gradle/**/*
        - .gitlab-ci.yml
    - if: $CI_COMMIT_BRANCH == "master"
      changes:
        - src/**/*
        - build.gradle.kts
        - settings.gradle.kts
        - gradle/**/*
        - .gitlab-ci.yml

release-jar:
  stage: release
  image: eclipse-temurin:21-jdk
  extends: .gradle-cache
  script:
    - ./gradlew shadowJar
    - cp build/libs/eventb-checker-*-all.jar eventb-checker.jar
  artifacts:
    paths:
      - eventb-checker.jar
  rules:
    - if: $CI_COMMIT_TAG =~ /^v/
  # Uncomment when hosting on GitLab:
  # release:
  #   tag_name: $CI_COMMIT_TAG
  #   description: "Release $CI_COMMIT_TAG"
  #   assets:
  #     links:
  #       - name: eventb-checker.jar
  #         url: "${CI_PROJECT_URL}/-/jobs/${CI_JOB_ID}/artifacts/file/eventb-checker.jar"
